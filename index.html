<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); }
        .dark .glass { background: rgba(30,30,30,0.7); border-color: rgba(255,255,255,0.1); }
        
        .glass-card { background: rgba(255,255,255,0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .dark .glass-card { background: rgba(50,50,50,0.6); border-color: rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        .glass-input { background: rgba(255,255,255,0.8); border: 1px solid rgba(139,92,246,0.2); transition: all 0.3s; }
        .glass-input:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        .dark .glass-input { background: rgba(40,40,40,0.8); border-color: rgba(255,255,255,0.1); }
        
        .btn-primary { background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%); color: white; box-shadow: 0 4px 15px rgba(139,92,246,0.4); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139,92,246,0.5); }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-gold { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); color: white; box-shadow: 0 4px 15px rgba(251,191,36,0.4); transition: all 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(251,191,36,0.5); }
        
        .ai-avatar { background: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%); }
        
        .chat-container { scrollbar-width: none; -ms-overflow-style: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes typing { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        .animate-slide-left { animation: slideLeft 0.4s ease-out; }
        .animate-slide-right { animation: slideRight 0.4s ease-out; }
        .animate-pop { animation: popIn 0.4s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-typing { animation: typing 1.2s ease-in-out infinite; }
        .animate-blink { animation: blink 1s ease-in-out infinite; }
        .animate-spin { animation: spin 1s linear infinite; }
        
        .sidebar-transition { transition: transform 0.3s ease; }
        .overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        
        .message-content pre { background: rgba(30,30,35,0.95); border-radius: 16px; padding: 16px; overflow-x: auto; margin: 12px 0; }
        .message-content code { background: rgba(139,92,246,0.15); padding: 2px 8px; border-radius: 8px; color: #A78BFA; }
        .message-content pre code { background: transparent; padding: 0; color: #fff; }
        
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
        .safe-top { padding-top: env(safe-area-inset-top, 0); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen flex">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-950 z-50">
        <div class="text-center">
            <div class="w-16 h-16 rounded-2xl ai-avatar flex items-center justify-center mx-auto mb-4 animate-float">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
            </div>
            <div class="text-gray-600 dark:text-gray-400">Loading Milan AI...</div>
        </div>
    </div>

    <div id="app" class="hidden flex w-full min-h-screen">
        <aside id="sidebar" class="sidebar-transition fixed lg:static inset-y-0 left-0 z-40 w-72 flex flex-col transform -translate-x-full lg:translate-x-0 glass border-r border-gray-200 dark:border-gray-800">
            <div class="p-5 border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 rounded-xl ai-avatar flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800 dark:text-white">Milan AI</h2>
                        <p class="text-xs text-gray-500">Your Assistant</p>
                    </div>
                </div>
                <button id="newChatBtn" class="w-full flex items-center justify-center gap-2 px-5 py-3.5 text-white font-semibold rounded-xl btn-gold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Chat
                </button>
            </div>
            
            <div class="p-4">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="insertAction('Explain this code: ')" class="p-3 glass-card rounded-xl text-left hover:scale-105 transition-transform">
                        <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center mb-2"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg></div>
                        <span class="text-xs font-medium text-gray-700 dark:text-gray-200">Code Help</span>
                    </button>
                    <button onclick="insertAction('Write a story about ')" class="p-3 glass-card rounded-xl text-left hover:scale-105 transition-transform">
                        <div class="w-8 h-8 rounded-lg bg-pink-500 flex items-center justify-center mb-2"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></div>
                        <span class="text-xs font-medium text-gray-700 dark:text-gray-200">Write Story</span>
                    </button>
                    <button onclick="insertAction('Summarize: ')" class="p-3 glass-card rounded-xl text-left hover:scale-105 transition-transform">
                        <div class="w-8 h-8 rounded-lg bg-green-500 flex items-center justify-center mb-2"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
                        <span class="text-xs font-medium text-gray-700 dark:text-gray-200">Summarize</span>
                    </button>
                    <button onclick="insertAction('Translate to Spanish: ')" class="p-3 glass-card rounded-xl text-left hover:scale-105 transition-transform">
                        <div class="w-8 h-8 rounded-lg bg-orange-500 flex items-center justify-center mb-2"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg></div>
                        <span class="text-xs font-medium text-gray-700 dark:text-gray-200">Translate</span>
                    </button>
                </div>
            </div>
            
            <div id="chatList" class="flex-1 overflow-y-auto p-3 space-y-1"></div>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-800 safe-bottom space-y-2">
                <button id="clearBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear All
                </button>
                <button id="settingsBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
                <button id="darkBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <svg id="darkIcon" class="w-5 h-5 hidden dark:block text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="lightIcon" class="w-5 h-5 block dark:hidden text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span id="themeText">Dark Mode</span>
                </button>
            </div>
        </aside>

        <div id="overlay" class="overlay fixed inset-0 z-30 lg:hidden hidden" onclick="toggleSidebar()"></div>

        <main class="flex-1 flex flex-col min-h-screen bg-gray-50 dark:bg-gray-950">
            <header class="lg:hidden flex items-center gap-3 px-4 py-3 sticky top-0 z-20 glass border-b border-gray-200 dark:border-gray-800 safe-top">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800">
                    <svg class="w-6 h-6 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="w-9 h-9 rounded-xl ai-avatar flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                </div>
                <h1 class="text-lg font-semibold text-gray-800 dark:text-white">Milan AI</h1>
            </header>

            <div id="chatContainer" class="chat-container flex-1 overflow-y-auto px-4 py-6">
                <div id="chatMessages" class="max-w-2xl mx-auto space-y-5"></div>
            </div>

            <div class="px-4 pb-4 safe-bottom bg-gray-50 dark:bg-gray-950 pt-4">
                <div class="max-w-2xl mx-auto">
                    <div class="glass-input rounded-2xl px-4 py-3 flex items-end gap-3">
                        <textarea id="userInput" rows="1" placeholder="Ask Milan AI..." class="flex-1 resize-none bg-transparent text-gray-800 dark:text-white placeholder-gray-400 outline-none max-h-36 text-base py-1" style="height:44px"></textarea>
                        <button id="sendBtn" class="w-11 h-11 btn-gold text-white rounded-xl flex items-center justify-center disabled:opacity-40 flex-shrink-0" disabled>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                        <button id="stopBtn" class="w-11 h-11 bg-red-500 hover:bg-red-600 text-white rounded-xl flex items-center justify-center hidden flex-shrink-0">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-2 text-center">Text only • Milan AI can make mistakes</p>
                </div>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-50 hidden" onclick="closeSettings()">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="absolute inset-x-4 sm:left-1/2 sm:-translate-x-1/2 top-1/2 -translate-y-1/2 max-w-md w-full glass rounded-3xl shadow-2xl p-6" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">Milan AI Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-2">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." class="w-full px-4 py-3 glass-input rounded-xl text-gray-800 dark:text-white placeholder-gray-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-2">Model</label>
                    <input type="text" id="modelInput" value="anthropic/claude-3.5-sonnet" placeholder="e.g. anthropic/claude-3.5-sonnet" class="w-full px-4 py-3 glass-input rounded-xl text-gray-800 dark:text-white placeholder-gray-400 outline-none">
                    <p class="text-xs text-gray-400 mt-1">Find models at <a href="https://openrouter.ai/models" target="_blank" class="text-purple-500 hover:underline">openrouter.ai/models</a></p>
                </div>
                <div class="p-3 bg-amber-50 dark:bg-amber-900/20 rounded-xl">
                    <p class="text-xs text-amber-700 dark:text-amber-300">Text only • Images not supported. For image analysis, use Claude 3.5 Sonnet, GPT-4o, or Gemini Pro.</p>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeSettings()" class="flex-1 px-4 py-3 glass-card text-gray-700 dark:text-white font-medium rounded-xl">Cancel</button>
                <button onclick="saveSettings()" class="flex-1 px-4 py-3 btn-primary text-white font-medium rounded-xl">Save</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var API = 'https://openrouter.ai/api/v1/chat/completions';
        var state = { chats: [], currentId: null, streaming: false, abort: null };
        var el = {
            loading: document.getElementById('loading'),
            app: document.getElementById('app'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatList: document.getElementById('chatList'),
            chatMessages: document.getElementById('chatMessages'),
            chatContainer: document.getElementById('chatContainer'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            stopBtn: document.getElementById('stopBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            darkBtn: document.getElementById('darkBtn'),
            themeText: document.getElementById('themeText'),
            newChatBtn: document.getElementById('newChatBtn'),
            clearBtn: document.getElementById('clearBtn'),
            settingsModal: document.getElementById('settingsModal'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            modelInput: document.getElementById('modelInput')
        };

        function init() {
            try {
                loadData();
                applyTheme();
                setupEvents();
                renderChats();
                if (state.chats.length === 0) {
                    createChat();
                } else {
                    selectChat(state.chats[0].id);
                }
            } catch(e) {
                console.error(e);
            }
            showApp();
        }

        function loadData() {
            try {
                var s = localStorage.getItem('milanState');
                if (s) { var p = JSON.parse(s); state.chats = p.chats || []; state.currentId = p.currentId; }
                var set = localStorage.getItem('milanSettings');
                if (set) { var st = JSON.parse(set); el.apiKeyInput.value = st.apiKey || ''; el.modelInput.value = st.model || 'anthropic/claude-3.5-sonnet'; }
                else { el.modelInput.value = 'anthropic/claude-3.5-sonnet'; el.modelInput.placeholder = 'e.g. anthropic/claude-3.5-sonnet'; }
            } catch(e) { el.modelInput.value = 'anthropic/claude-3.5-sonnet'; }
        }

        function saveData() {
            try {
                localStorage.setItem('milanState', JSON.stringify({ chats: state.chats, currentId: state.currentId }));
                localStorage.setItem('milanSettings', JSON.stringify({ apiKey: el.apiKeyInput.value, model: el.modelInput.value }));
            } catch(e) {}
        }

        function showApp() {
            el.loading.style.display = 'none';
            el.app.style.display = 'flex';
        }

        function applyTheme() {
            var dark = localStorage.getItem('theme') === 'dark';
            if (dark) { document.documentElement.classList.add('dark'); el.themeText.textContent = 'Light Mode'; }
            else { document.documentElement.classList.remove('dark'); el.themeText.textContent = 'Dark Mode'; }
        }

        function setupEvents() {
            el.sendBtn.onclick = sendMsg;
            el.stopBtn.onclick = stopStream;
            el.newChatBtn.onclick = function() { selectChat(createChat()); };
            el.clearBtn.onclick = function() { if (confirm('Clear all chats?')) { state.chats = []; createChat(); selectChat(state.chats[0].id); } };
            el.settingsBtn.onclick = function() { el.settingsModal.classList.remove('hidden'); };
            el.darkBtn.onclick = function() { localStorage.setItem('theme', localStorage.getItem('theme') === 'dark' ? 'light' : 'dark'); applyTheme(); };
            el.userInput.oninput = function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 144) + 'px';
                el.sendBtn.disabled = !this.value.trim();
            };
            el.userInput.onkeydown = function(e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!el.sendBtn.disabled) sendMsg(); }
            };
            el.userInput.onpaste = function(e) {
                if (e.clipboardData && e.clipboardData.items) {
                    for (var i = 0; i < e.clipboardData.items.length; i++) {
                        if (e.clipboardData.items[i].type && e.clipboardData.items[i].type.indexOf('image') !== -1) {
                            e.preventDefault();
                            alert('Image paste not supported.\n\nThis chat is text only.');
                            return false;
                        }
                    }
                }
            };
        }

        function toggleSidebar() {
            var open = !el.sidebar.classList.contains('-translate-x-full');
            if (open) { el.sidebar.classList.add('-translate-x-full'); el.overlay.classList.add('hidden'); }
            else { el.sidebar.classList.remove('-translate-x-full'); el.overlay.classList.remove('hidden'); }
        }

        function createChat() {
            var id = Date.now().toString();
            state.chats.unshift({ id: id, title: 'New Chat', msgs: [] });
            saveData();
            renderChats();
            return id;
        }

        function selectChat(id) {
            state.currentId = id;
            var chat = getChat();
            renderMsgs(chat ? chat.msgs : []);
            renderChats();
            saveData();
            if (window.innerWidth < 1024) toggleSidebar();
            el.userInput.focus();
        }

        function getChat() {
            for (var i = 0; i < state.chats.length; i++) { if (state.chats[i].id === state.currentId) return state.chats[i]; }
            return null;
        }

        function renderChats() {
            var h = '';
            for (var i = 0; i < state.chats.length; i++) {
                var c = state.chats[i];
                var a = c.id === state.currentId;
                h += '<div class="group relative"><button onclick="selectChat(\'' + c.id + '\')" class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-xl transition-colors ' + (a ? 'bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800') + '">' +
                    '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>' +
                    '<span class="flex-1 truncate text-sm">' + escHtml(c.title) + '</span></button>' +
                    '<button onclick="event.stopPropagation(); deleteChat(\'' + c.id + '\')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity" title="Delete"><svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button></div>';
            }
            el.chatList.innerHTML = h;
        }

        function deleteChat(id) {
            if (state.chats.length <= 1) return;
            state.chats = state.chats.filter(function(c) { return c.id !== id; });
            if (state.currentId === id) state.currentId = state.chats[0].id;
            saveData();
            renderChats();
            selectChat(state.currentId);
        }

        function renderMsgs(msgs) {
            if (msgs.length === 0) {
                el.chatMessages.innerHTML = '<div class="flex flex-col items-center justify-center min-h-[60vh] text-center animate-fade">' +
                    '<div class="w-20 h-20 rounded-2xl ai-avatar flex items-center justify-center mb-6 shadow-xl animate-float">' +
                    '<svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div>' +
                    '<h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">Hi, I\'m Milan AI!</h2>' +
                    '<p class="text-gray-500 dark:text-gray-400 mb-4">Text only • Ask me anything</p>' +
                    '<div class="grid grid-cols-2 gap-3 max-w-sm">' +
                    '<button onclick="insertAction(\'Help me write an email\')" class="p-4 glass-card rounded-xl text-left"><div class="w-10 h-10 rounded-lg bg-blue-500 flex items-center justify-center mb-2"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div><span class="text-sm font-medium text-gray-700 dark:text-gray-200">Write Email</span></button>' +
                    '<button onclick="insertAction(\'Explain this concept:\')" class="p-4 glass-card rounded-xl text-left"><div class="w-10 h-10 rounded-lg bg-purple-500 flex items-center justify-center mb-2"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div><span class="text-sm font-medium text-gray-700 dark:text-gray-200">Explain Topic</span></button>' +
                    '<button onclick="insertAction(\'Debug this code:\')" class="p-4 glass-card rounded-xl text-left"><div class="w-10 h-10 rounded-lg bg-green-500 flex items-center justify-center mb-2"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg></div><span class="text-sm font-medium text-gray-700 dark:text-gray-200">Debug Code</span></button>' +
                    '<button onclick="insertAction(\'Brainstorm ideas for:\')" class="p-4 glass-card rounded-xl text-left"><div class="w-10 h-10 rounded-lg bg-orange-500 flex items-center justify-center mb-2"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div><span class="text-sm font-medium text-gray-700 dark:text-gray-200">Brainstorm</span></button>' +
                    '</div></div>';
                return;
            }
            var h = '';
            for (var i = 0; i < msgs.length; i++) h += renderMsg(msgs[i]);
            el.chatMessages.innerHTML = h;
            el.chatContainer.scrollTop = el.chatContainer.scrollHeight;
        }

        function renderMsg(msg) {
            var user = msg.role === 'user';
            var txt = msg.content || '';
            var html = user ? escHtml(txt) : (typeof marked !== 'undefined' ? marked.parse(txt) : txt);
            var cls = user ? 'justify-end' : 'justify-start';
            var bubble = user ? 'bg-purple-500 text-white' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100';
            var anim = user ? 'animate-slide-right' : 'animate-slide-left';
            var ava = user ? 'btn-primary' : 'ai-avatar';
            var icon = user ? '<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>' : 
                '<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>';
            return '<div class="flex ' + cls + ' gap-3 ' + anim + '">' +
                (!user ? '<div class="w-10 h-10 ' + ava + ' rounded-xl flex items-center justify-center shadow-lg animate-pop">' + icon + '</div>' : '') +
                '<div class="max-w-sm sm:max-w-md message-content ' + bubble + ' rounded-2xl px-4 py-3 ' + (user ? 'rounded-br-sm shadow-lg' : 'rounded-bl-sm shadow') + '">' +
                '<div class="text-[15px] leading-relaxed whitespace-pre-wrap">' + html + '</div></div>' +
                (user ? '<div class="w-10 h-10 ' + ava + ' rounded-xl flex items-center justify-center shadow-lg animate-pop">' + icon + '</div>' : '') +
                '</div>';
        }

        function escHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        window.insertAction = function(t) { el.userInput.value = t; el.userInput.focus(); el.userInput.dispatchEvent(new Event('input')); };
        window.selectChat = selectChat;
        window.toggleSidebar = toggleSidebar;
        window.closeSettings = function() { el.settingsModal.classList.add('hidden'); };
        window.saveSettings = function() { saveData(); closeSettings(); };

        async function sendMsg() {
            var txt = el.userInput.value.trim();
            if (!txt || state.streaming) return;
            
            if (/data:image\//.test(txt) || /!\[[^\]]*\]\(.*\.(jpg|jpeg|png|gif|webp)/i.test(txt)) {
                alert('Images not supported. Text only.');
                return;
            }
            
            var key = el.apiKeyInput.value.trim();
            if (!key) { alert('Enter API key in Settings'); el.settingsModal.classList.remove('hidden'); return; }
            
            var chat = getChat();
            if (!chat) return;
            if (chat.msgs.length === 0) chat.title = txt.substring(0, 30) + (txt.length > 30 ? '...' : '');
            
            chat.msgs.push({ role: 'user', content: txt });
            el.userInput.value = '';
            el.userInput.style.height = 'auto';
            el.sendBtn.disabled = true;
            renderMsgs(chat.msgs);
            renderChats();
            saveData();

            var typing = '<div class="flex justify-start gap-3 animate-slide-left" id="typing">' +
                '<div class="w-10 h-10 ai-avatar rounded-xl flex items-center justify-center shadow-lg animate-pop">' +
                '<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div>' +
                '<div class="bg-white dark:bg-gray-800 rounded-2xl rounded-bl-sm shadow px-4 py-3">' +
                '<div class="flex gap-1.5"><span class="w-2.5 h-2.5 bg-purple-400 rounded-full animate-typing"></span><span class="w-2.5 h-2.5 bg-purple-400 rounded-full animate-typing" style="animation-delay:.15s"></span><span class="w-2.5 h-2.5 bg-purple-400 rounded-full animate-typing" style="animation-delay:.3s"></span></div></div></div>';
            el.chatMessages.insertAdjacentHTML('beforeend', typing);
            el.chatContainer.scrollTop = el.chatContainer.scrollHeight;

            state.streaming = true;
            el.sendBtn.style.display = 'none';
            el.stopBtn.style.display = 'flex';

            chat.msgs.push({ role: 'assistant', content: '' });
            var idx = chat.msgs.length - 1;
            state.abort = new AbortController();

            try {
                var msgs = [{ role: 'system', content: 'You are Milan AI, a helpful assistant.' }];
                for (var i = 0; i < chat.msgs.length - 1; i++) msgs.push({ role: chat.msgs[i].role, content: chat.msgs[i].content });

                var res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key, 'HTTP-Referer': location.href, 'X-Title': 'Milan AI' },
                    body: JSON.stringify({ model: el.modelInput.value, messages: msgs, stream: true }),
                    signal: state.abort.signal
                });

                if (!res.ok) throw new Error('API Error: ' + res.status);

                var reader = res.body.getReader();
                var dec = new TextDecoder();
                var buf = '';

                while (true) {
                    var r = await reader.read();
                    if (r.done) break;
                    buf += dec.decode(r.value, { stream: true });
                    var lines = buf.split('\n');
                    buf = lines.pop() || '';
                    for (var k = 0; k < lines.length; k++) {
                        if (lines[k].indexOf('data: ') === 0) {
                            var d = lines[k].slice(6);
                            if (d === '[DONE]') continue;
                            try {
                                var j = JSON.parse(d);
                                var t = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content;
                                if (t) { chat.msgs[idx].content += t; updateStream(chat.msgs[idx].content); }
                            } catch(e) {}
                        }
                    }
                }
            } catch(e) {
                var typ = document.getElementById('typing');
                if (typ) typ.remove();
                if (e.name === 'AbortError') chat.msgs[idx].content = '*Stopped*';
                else {
                    var m = e.message || '';
                    if (m.toLowerCase().includes('clipboard') || m.toLowerCase().includes('image')) chat.msgs[idx].content = '**Image input not supported.**\n\nThis chat is text only.';
                    else if (m.toLowerCase().includes('401')) chat.msgs[idx].content = '**Invalid API key.** Check Settings.';
                    else chat.msgs[idx].content = '**Error:** ' + m;
                }
                renderMsgs(chat.msgs);
            } finally {
                state.streaming = false;
                state.abort = null;
                el.sendBtn.style.display = 'flex';
                el.stopBtn.style.display = 'none';
                saveData();
            }
        }

        function updateStream(content) {
            var typ = document.getElementById('typing');
            if (typ) typ.remove();
            var msgs = el.chatMessages.querySelectorAll('.message-content');
            var last = msgs[msgs.length - 1];
            if (last) { 
                var parsed = typeof marked !== 'undefined' ? marked.parse(content) : escHtml(content);
                last.innerHTML = parsed + '<span class="inline-block w-0.5 h-5 bg-purple-500 ml-1 animate-blink"></span>'; 
                el.chatContainer.scrollTop = el.chatContainer.scrollHeight; 
            }
        }

        function stopStream() { if (state.abort) state.abort.abort(); }

        if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true });
        else { window.marked = { parse: function(t) { if (!t) return ''; t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>'); return t; } }; }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
    </script>
</body>
</html>
